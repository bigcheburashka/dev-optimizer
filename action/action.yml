name: 'Dev Optimizer'
description: 'Analyze your repository for CI/CD, Docker, and dependency optimization opportunities'
author: 'dev-optimizer'
branding:
  icon: 'zap'
  color: 'blue'

inputs:
  path:
    description: 'Path to analyze (default: repository root)'
    required: false
    default: '.'
  domains:
    description: 'Comma-separated list of domains to analyze (docker,deps,ci,all)'
    required: false
    default: 'all'
  format:
    description: 'Output format (console,json,markdown)'
    required: false
    default: 'markdown'
  fail-on-issues:
    description: 'Fail the action if issues are found'
    required: false
    default: 'false'
  save-baseline:
    description: 'Save baseline for regression tracking'
    required: false
    default: 'false'
  compare-baseline:
    description: 'Compare with previous baseline and fail on regression'
    required: false
    default: 'false'

outputs:
  findings-count:
    description: 'Number of findings found'
  score:
    description: 'Repository score (0-100)'
  report:
    description: 'Path to the generated report'

runs:
  using: 'node20'
  main: 'action/dist/index.js'